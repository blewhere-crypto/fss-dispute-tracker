name: Daily FSS Dispute Case Scrape

on:
  schedule:
    - cron: "0 23 * * *"   # 매일 UTC 23:00 = KST 08:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape latest case list
        run: python scraper.py --detail

      - name: AI analyze new cases (Gemini free tier)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_analyze.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet && echo "변경 없음" || git commit -m "chore: daily data + analysis update $(date -u +%Y-%m-%d)"
          git push
